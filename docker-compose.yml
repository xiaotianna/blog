services:
  nginx:
    image: ${BLOG_NGINX_IMAGE:-blog-nginx:latest}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: deploy/docker/nginx.Dockerfile
    container_name: blog-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"

  frontend:
    image: ${BLOG_FRONTEND_IMAGE:-blog-frontend:latest}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/frontend.Dockerfile
    container_name: blog-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      SITE_URL: ${SITE_URL:-http://localhost}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-${SITE_URL:-http://localhost}}
      GO_API_BASE_URL: http://backend:8000
      GO_PUBLIC_BASE_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    image: ${BLOG_BACKEND_IMAGE:-blog-backend:latest}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: ./backend
      dockerfile: ../deploy/docker/backend.Dockerfile
    container_name: blog-backend
    restart: unless-stopped
    user: "${BACKEND_UID:-0}:${BACKEND_GID:-0}"
    environment:
      APP_PORT: :8000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      DB_DB_NAME: ${POSTGRES_DB:-blog}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      REDIS_DB: ${REDIS_DB:-0}
      ACCOUNT_PHONE: ${ACCOUNT_PHONE:-15583251761}
      ACCOUNT_PASSWORD: ${ACCOUNT_PASSWORD:-123456}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-secret_key_t1an}
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-blog}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: blog-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      TZ: Asia/Shanghai
    command: >
      sh -c 'redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass "$${REDIS_PASSWORD}"'
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
  uploads:
